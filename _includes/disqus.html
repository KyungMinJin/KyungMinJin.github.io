<div class="utterances-container"></div>
<script>
  function loadUtterances(theme) {
    var currentScript = document.currentScript;
    var container = currentScript && currentScript.previousElementSibling;

    if (!container || !container.classList.contains('utterances-container')) {
      return;
    }

    if (container.querySelector('.utterances')) {
      return;
    }

    var script = document.createElement('script');
    script.src = 'https://utteranc.es/client.js';
    script.setAttribute('repo', 'KyungMinJin/KyungMinJin.github.io');
    script.setAttribute('issue-term', 'og:title');
    script.setAttribute('theme', theme);
    script.setAttribute('crossorigin', 'anonymous');
    script.async = true;
    container.appendChild(script);
  }

  function setUtterancesTheme(theme) {
    var iframe = document.querySelector('.utterances iframe');
    if (iframe) {
      iframe.contentWindow.postMessage({type: 'set-theme', theme: theme}, 'https://utteranc.es');
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    var isDark = document.documentElement.classList.contains("dark-mode");
    loadUtterances(isDark ? 'github-dark' : 'github-light');
  });
</script>
