<!-- begin post -->
{% assign author = site.authors[post.author] %}
<div class="col-12 mb-3 post-card-item" data-categories="{{ post.categories | join: ',' | downcase }}">
  <div class="card border-0 shadow-sm rounded overflow-hidden" style="border: 1px solid #f1f5f9 !important;">
    <div class="row no-gutters align-items-center">
      <div class="col-8 col-md-9 p-3 p-md-4">
         <div class="d-flex align-items-center mb-1">
             <span class="text-secondary font-weight-bold mr-2" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;">{{ post.categories | join: ', ' }}</span>
             <span class="text-muted" style="font-size: 0.75rem;">{{ post.date | date_to_string }}</span>
         </div>
         <h3 class="font-weight-bold mb-2" style="font-size: 1.15rem; line-height: 1.3; margin-top: 5px;">
             <a class="text-dark hover-underline text-decoration-none" href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
         </h3>
         <p class="text-muted d-none d-md-block mb-3" style="font-size: 0.88rem; line-height: 1.5;">
             {{ post.excerpt | strip_html | truncatewords:25 }}
         </p>
         {% if post.author %}
         <div class="d-flex align-items-center mt-2">
             <img class="author-thumb mr-2" src="{% if author.avatar %}{{site.baseurl}}/{{ author.avatar }}{% else %}/assets/images/gravatar.png{% endif %}" alt="{{ author.display_name }}" style="width: 20px; height: 20px; border-radius: 50%; margin-right: 6px;">
             <span class="author-meta" style="font-size: 0.75rem; color: #6c757d;">
                 By <a target="_blank" class="text-dark font-weight-bold" href="{{ author.web }}">{{ author.display_name }}</a>
             </span>
         </div>
         {% endif %}
      </div>
      <div class="col-4 col-md-3 text-right p-3 p-md-4">
         {% if post.image %}
         <a href="{{ site.baseurl }}{{ post.url }}">
             <img class="img-fluid rounded" src="{% if post.image contains '://' %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}" alt="{{ post.title }}" style="width: 95px; height: 95px; object-fit: cover; border: 1px solid #f1f5f9;">
         </a>
         {% endif %}
      </div>
    </div>
  </div>
</div>
<!-- end post -->
