- org_name_en: "LG Electronics"
  org_name_ko: "LG전자"
  logo: "/assets/images/lg_electronics_logo.jpg"
  duration_en: "Full-time · 3 yrs 4 mos (Mar 2023 - Present)"
  duration_ko: "정직원 · 3년 4개월 (2023.03 - 현재)"
  roles:
    - title_en: "Advanced Robotics Lab"
      title_ko: "로봇선행연구소 (Advanced Robotics Lab)"
      subtitle_en: "Robot Cognition Task Specialist (선임연구원)"
      subtitle_ko: "로봇 인지 태스크 선임연구원"
      date_en: "Jan 2026 - Present"
      date_ko: "2026.01 - 현재"
      desc_en: "Focusing on robotic perception, QA dataset construction, and developing QA systems integrating RAG with ROS2. Developing robotic query response capabilities."
      desc_ko: "로봇 인지 기술, 로봇 관련 QA 데이터셋 구축 및 RAG와 ROS2를 결합한 QA 시스템 개발 업무를 담당하고 있습니다."
    - title_en: "AI Lab"
      title_ko: "AI연구소 (AI Lab)"
      subtitle_en: "Multimodal Task Specialist (연구원)"
      subtitle_ko: "멀티모달 태스크 선임 연구원(연구원)"
      date_en: "Jul 2023 - Dec 2025"
      date_ko: "2023.07 - 2025.12"
      desc_en: "Researched \"Semantic-Aware Mutual Information Factorized Learning (SAMIF)\" for multimodal segmentation. Deployed action detection/control models to Qualcomm Neural SDK via ONNX. Designed audio tower and LLM cross modal continual learning pipeline. Researched GRPO/DPO online policy optimization for MLLMs with Toronto AI Lab."
      desc_ko: "멀티모달 세그멘테이션을 위한 \"SAMIF\" 모델 연구를 진행했습니다. 행동 검출 및 제어 모델을 ONNX를 통해 Qualcomm Neural SDK에 이식했습니다. 오디오 인코더 및 LLM의 교차 모달 지속 학습 파이프라인을 설계했습니다. 토론토 AI 연구소와 협력하여 MLLM을 위한 GRPO/DPO 온라인 정책 최적화 연구를 수행했습니다."
    - title_en: "Cognitive Vision TP"
      title_ko: "영상인지 TP (Cognitive Vision TP)"
      subtitle_en: "Cognitive Vision TP Researcher (연구원)"
      subtitle_ko: "영상인지 연구원 (연구원)"
      date_en: "Mar 2023 - Jul 2023"
      date_ko: "2023.03 - 2023.07"
      desc_en: "Optimized body pose estimation models using quantized-aware training for LG TV edge device deployment. Designed RecycleNet for hand mesh synthesis and proposed grouping attention mechanism per finger, achieving state-of-the-art performance in PA-MPJPE."
      desc_ko: "LG TV 엣지 디바이스 배포용 인체 포즈 추정 모델을 양자화 인식 학습(QAT)을 사용하여 최적화했습니다. 핸드 메쉬 합성을 위한 RecycleNet을 설계하고 손가락별 그룹핑 어텐션 메커니즘을 제안하여 PA-MPJPE SOTA 성능을 달성했습니다."
  cv_highlights_en:
    - "<strong>Robotics Perception & Embodied AI (Advanced Robotics Lab):</strong> Developing language-grounded robotic query-response intelligence, building robust open-world spatial perception systems, and constructing RAG-ROS2 query datasets."
    - "<strong>Multimodal Examodal Project (AI Lab):</strong> Co-designed large-scale Vision-Language-Audio models for appliance event detection; optimized cross-modal alignment and implemented appliance log integration."
    - "<strong>Edge Quantization:</strong> Integrated action recognition and hand mesh models into TV edge devices, utilizing Quantization-Aware Training (QAT) to Qualcomm Neural SDK frameworks."
  cv_highlights_ko:
    - "<strong>로봇 인지 및 Embodied AI (로봇선행연구소):</strong> 로봇의 시각 인지 및 자연어 기반 환경 파악 연구, RAG와 ROS2를 결합한 질의응답 모델 고도화, 전용 데이터셋 구축."
    - "<strong>멀티모달 가전 상황인지 (AI연구소):</strong> 대규모 영상-오디오-로그 융합 추론 모델(Examodal) 구조 설계 및 크로스모달 얼라인먼트 최적화."
    - "<strong>임베디드 최적화:</strong> ONNX 및 Qualcomm Neural SDK를 이용한 행동 검출 및 손 메쉬 모델 엣지(Edge/TV) 기기 탑재 및 QAT(양자화 인식 학습) 최적화."

- org_name_en: "Korea University"
  org_name_ko: "고려대학교"
  logo: "/assets/images/korea logo.jpg"
  duration_en: "7 yrs (Mar 2016 - Feb 2023)"
  duration_ko: "7년 (2016.03 - 2023.02)"
  roles:
    - title_en: "Graduate School"
      title_ko: "대학원 (Graduate School)"
      subtitle_en: "M.S. in Artificial Intelligence (PRML Lab)"
      subtitle_ko: "인공지능학과 석사 학위 수여 (PRML 연구실)"
      date_en: "Sep 2021 - Feb 2023"
      date_ko: "2021.09 - 2023.02"
      desc_en: "Advised by Prof. Seong-Hwan Lee. Specialized in video-based human pose estimation, spatial-temporal attention transformers, and mutual learning. Published first-author papers at WACV 2023 (Oral) and Neural Networks. Graduated with a perfect GPA of 4.50/4.50."
      desc_ko: "이성환 교수님의 지도하에 연구를 수행했습니다. 비디오 기반 인체 포즈 추정, 시공간 어텐션 트랜스포머 및 상호 학습 연구를 전문으로 하였습니다. WACV 2023 (Oral) 및 Neural Networks 저널에 제1저자 논문을 게재했습니다. 만점 평점(4.50/4.50)으로 졸업했습니다."
    - title_en: "College of Informatics"
      title_ko: "정보대학 (College of Informatics)"
      subtitle_en: "B.S. in Computer Science & CSE / Artificial Intelligence"
      subtitle_ko: "컴퓨터학과 학사 졸업 / 인공지능학 복수전공"
      date_en: "Mar 2016 - Aug 2021"
      date_ko: "2016.03 - 2021.08"
      desc_en: "Completed double majors in Computer Science and Artificial Intelligence. Graduated with Honors. Cumulative GPA of 3.99/4.50 (AI major GPA: 4.17/4.50)."
      desc_ko: "컴퓨터학과와 인공지능학 복수전공을 이수했습니다. 우등 졸업(Graduated with Honors)을 하였으며, 전체 평점 3.99/4.50 (인공지능 전공 평점: 4.17/4.50)을 취득했습니다."
  cv_highlights_en:
    - "<strong>Video Pose Estimation:</strong> Designed physical law-guided hierarchical attention transformers (HANet) to tackle joint jitter. Published at top computer vision venue <strong>WACV 2023 (Oral)</strong>."
    - "<strong>Occlusion-Aware Transformer (OTPose):</strong> Proposed self-supervised occluded-joint learning frameworks in sparse annotation videos (IEEE SMC 2022 Oral)."
    - "<strong>3D Mesh Recovery:</strong> Co-developed self-supervised Multi-Hypothesis Canonical lifting networks for in-the-wild video pose recovery (Pattern Recognition 2024)."
  cv_highlights_ko:
    - "<strong>비디오 인체 포즈 추정 (HANet):</strong> 물리 운동 법칙(속도/가속도)을 활용해 프레임 간 튀는 떨림을 해결하는 트랜스포머 아키텍처 제안 (<strong>WACV 2023 Oral</strong> 발표)."
    - "<strong>가림 현상 해결 (OTPose):</strong> 레이블링이 드문 비디오 환경에서 가려진 관절점을 가상 보정하는 Occlusion-Aware Transformer 설계 (IEEE SMC 2022 Oral)."
    - "<strong>3D 구조 복원 (MHCanonNet):</strong> 와일드 비디오 시각 정보의 3D 리프팅 네트워크 설계 (Pattern Recognition 2024 게재)."

