main_projects:
  - badge_text: "Robotics / Embodied AI"
    badge_class: "badge-primary"
    org_icon: "fa-building-o"
    org_name: "LG Electronics, Advanced Robotics Lab"
    duration: "2026.01 - Present"
    title: "Natural Language-Based Object Understanding for Robots"
    desc: "Building robot perception systems that ground natural language in visual environments to enable intuitive human-robot interaction and reasoning."
    highlights:
      - "Constructed a contextual Knowledge Graph and RAG-based Vector Database."
      - "Generated QA pairs based on video shots and interaction history."
      - "Developed a time-sensitive hybrid RAG QA system for robot reasoning."
    tags:
      - "Python"
      - "PyTorch"
      - "LangChain"
      - "llama-index"
      - "Qdrant"
    links:
      - text: "Read Research Note"
        url: "/posts/robotics-kg/"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
    image: "/assets/images/robotics_perception_kg.png"
    image_alt: "Robotics Knowledge Graph"

  - badge_text: "Multimodal Learning"
    badge_class: "badge-success"
    org_icon: "fa-building-o"
    org_name: "LG Electronics, AI Lab"
    duration: "2023.07 - 2025.12"
    title: "SAMIF: Semantic-Aware Mutual Information Factorized Learning"
    desc: "Researched cross-modality shared and unique information factorization strategies to improve semantic segmentation across aligned data modalities."
    highlights:
      - "Designed, experimented, and validated cross-modality factorized learning frameworks."
      - "Achieved state-of-the-art performance for multimodal semantic segmentation (2-3% improvement)."
      - "Created PoC by improving the IoU (0.3% ↑) and f1-score (23% ↑) in action localization."
    tags:
      - "Python"
      - "PyTorch"
      - "Cross-attention"
      - "ONNX"
      - "Qualcomm SDK"
    links:
      - text: "Read Research Note"
        url: "/posts/samif/"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
    image: "/assets/images/multimodal_samif.png"
    image_alt: "SAMIF Architecture"

  - badge_text: "LLM / VLM"
    badge_class: "badge-danger"
    org_icon: "fa-building-o"
    org_name: "LG Electronics, AI Lab"
    duration: "2024 - 2025"
    title: "Small Multimodal LLM & Audio Tower Training"
    desc: "Developed small-scale multimodal language models featuring audio/vision towers and optimized using advanced policy training."
    highlights:
      - "Designed an audio tower and LLM cross-modal continual learning pipeline."
      - "Achieved a 20.7% improvement by training GRPO on synthetic data with Self-Reflection."
      - "Served image and video-based QA demo applications within the company."
    tags:
      - "Python"
      - "PyTorch"
      - "FastAPI"
      - "Transformers"
      - "TRL"
      - "Gradio"
    links:
      - text: "Read Research Note"
        url: "/posts/grpo/"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
    image: "/assets/images/grpo_vlm_alignment.png"
    image_alt: "GRPO VLM Alignment"

  - badge_text: "Reinforcement Learning"
    badge_class: "badge-info"
    org_icon: "fa-users"
    org_name: "LG Electronics & Toronto AI Lab"
    duration: "Joint Research"
    title: "Fast-Reasoning Modality-Aware Policy Optimization"
    desc: "Collaborated on online policy optimization methods that apply modality-aware weighting in Group Relative Policy Optimization (GRPO)."
    highlights:
      - "Proposed a loss update and reward mechanism that applies modality-aware online weighting in GRPO."
      - "Improved answer accuracy after fast reasoning by predicting missed and hallucinated cases."
      - "Co-authored and submitted a paper on the resulting policy optimization framework."
    tags:
      - "Python"
      - "PyTorch"
      - "veRL"
      - "GRPO / DPO"
    links:
      - text: "View Policy Optimization Details"
        url: "/posts/grpo/#2-modality-aware-online-weighting"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
    image: "/assets/images/qat_pose_estimation.png"
    image_alt: "Modality-Aware weighting"

  - badge_text: "Computer Vision"
    badge_class: "badge-warning"
    org_icon: "fa-graduation-cap"
    org_name: "Korea University & LG Electronics"
    duration: "Research & Deployed"
    title: "Optimized Body & Hand Pose Estimation"
    desc: "Developed state-of-the-art pose estimation algorithms and optimized them for edge-device integration."
    highlights:
      - "Trained 2D & 3D pose estimation models using Quantization-Aware Training (QAT)."
      - "Designed RecycleNet, which re-trains synthesized hand mesh models."
      - "Successfully deployed body pose estimation models to LG Smart TVs."
    tags:
      - "Python"
      - "PyTorch"
      - "ONNX"
      - "QAT"
      - "Transformers"
    links:
      - text: "Read HANet Paper Summary"
        url: "/posts/hanet/"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
      - text: "View SNPE Deployment Guide"
        url: "/posts/snpe-setup-guide/"
        icon: "fa-cogs"
        class: "btn-outline-success mr-2"
      - text: "GitHub Code"
        url: "https://github.com/KyungMinJin/HANet"
        icon: "fa-github"
        class: "btn-outline-dark"
        external: true
    image: "/assets/images/pw3d_smpl.gif"
    image_alt: "3D SMPL Pose Estimation Tracking"

  - badge_text: "Embedded AI"
    badge_class: "badge-secondary"
    org_icon: "fa-building-o"
    org_name: "Voice Caddie"
    duration: "2020.05 - 2020.11"
    title: "Golf Pose Estimation & Action Localization"
    desc: "Developed and optimized golf swing pose estimation models and temporal action localization algorithms for portable smart devices."
    highlights:
      - "Deployed golf pose estimation models onto AI assistant golf devices."
      - "Created action localization pipelines and dedicated annotation tools for internal dataset curation."
    tags:
      - "Python"
      - "PyTorch"
      - "C++"
      - "OpenCV"
    links:
      - text: "Read Edge AI Guide"
        url: "/posts/edge-deployment/"
        icon: "fa-book"
        class: "btn-outline-primary mr-2"
    image: "/assets/images/pose_estimation_cv.png"
    image_alt: "Golf Pose Estimation"

