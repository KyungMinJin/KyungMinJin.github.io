name: Update Google Scholar Metrics

on:
  schedule:
    - cron: '0 15 * * *' # Runs daily at 15:00 UTC (12:00 AM KST)
  workflow_dispatch: # Allows manual trigger via GitHub web interface

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run scholar sync script
        run: python3 scripts/update_scholar.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/scholar.json
          if git diff --staged --quiet; then
            echo "No scholar metric changes to commit."
          else
            git commit -m "chore: auto-update google scholar metrics"
            git push
          fi
