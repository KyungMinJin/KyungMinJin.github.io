name: Update Google Scholar Metrics

on:
  schedule:
    - cron: '0 15 * * *' # Runs daily at 15:00 UTC (12:00 AM KST)
  workflow_dispatch: # Allows manual trigger via GitHub web interface

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4

      - name: Run scholar sync script
        run: python scripts/update_scholar.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/scholar.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update google scholar metrics" && git push)
