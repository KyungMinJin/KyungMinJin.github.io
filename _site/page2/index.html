<script>
// Category Filtering Script
function initCategoryFilter() {
  const chips = document.querySelectorAll(".category-filter-chips .chip");
  const postItems = document.querySelectorAll(".post-card-item");
  if (!chips.length) return;

  chips.forEach(chip => {
    chip.addEventListener("click", function() {
      chips.forEach(c => c.classList.remove("active"));
      this.classList.add("active");

      const filterValue = this.getAttribute("data-filter").toLowerCase();

      postItems.forEach(item => {
        const rawCategories = item.getAttribute("data-categories") || "";
        const categories = rawCategories.split(",").map(c => c.trim().toLowerCase().replace(/\s+/g, '-'));
        
        const matches = filterValue === "all" || 
                        categories.includes(filterValue) || 
                        categories.some(cat => cat.replace(/-/g, '') === filterValue.replace(/-/g, ''));
        
        if (matches) {
          item.style.display = ""; 
          setTimeout(() => {
            item.style.opacity = "1";
            item.style.transform = "scale(1)";
          }, 10);
        } else {
          item.style.opacity = "0";
          item.style.transform = "scale(0.95)";
          item.style.display = "none";
        }
      });
    });
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initCategoryFilter);
} else {
  initCategoryFilter();
}

// Email Copy to Clipboard Script
function copyEmailToClipboard() {
    const email = "km.jin0507@gmail.com";
    navigator.clipboard.writeText(email).then(() => {
        const btnText = document.getElementById("copyBtnText");
        const origText = btnText.innerHTML;
        btnText.innerHTML = "Copied!";
        
        const toast = document.getElementById("copyAlert");
        toast.style.display = "block";
        
        setTimeout(() => {
            btnText.innerHTML = origText;
        }, 1500);
        
        setTimeout(() => {
            toast.style.display = "none";
        }, 2500);
    }).catch(err => {
        console.error("Failed to copy text: ", err);
    });
}
</script>

    <script>
      function changeLanguage(lang) {
        document.documentElement.classList.remove('lang-mode-en', 'lang-mode-ko');
        document.documentElement.classList.add('lang-mode-' + lang);
        localStorage.setItem('pref-lang', lang);
        var labels = document.querySelectorAll('#currentLangLabel');
        labels.forEach(function(label) {
          label.textContent = lang === 'ko' ? '한국어' : 'English';
        });
      }
      document.addEventListener("DOMContentLoaded", function() {
        var savedLang = localStorage.getItem('pref-lang');
        if (!savedLang) {
          var userLang = navigator.language || navigator.userLanguage;
          savedLang = userLang.startsWith('ko') ? 'ko' : 'en';
        }
        changeLanguage(savedLang);
      });
    </script>
